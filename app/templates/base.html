<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ meta_description or 'Portfolio Website' }}">
    <title data-i18n="meta.title">{{ title or "Portfolio Website" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}?v=20260420-3">
</head>
<body id="top">
    <div class="scroll-progress" aria-hidden="true">
        <div id="scroll-progress-bar" class="scroll-progress__bar"></div>
    </div>
    <div id="cursor-glow" class="cursor-glow" aria-hidden="true"></div>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <div class="ambient ambient-three"></div>

    <header class="site-header">
        <div class="site-header__inner">
            <a class="brand" href="#top">
                <span class="brand-mark">KC</span>
                <span class="brand-copy">{{ profile.short_name }}</span>
            </a>

            <nav class="primary-nav" aria-label="Primary">
                <a href="#about" data-i18n="nav.about">About</a>
                <a href="#skills" data-i18n="nav.skills">Skills</a>
                <a href="#projects" data-i18n="nav.projects">Projects</a>
                <a href="#experience" data-i18n="nav.experience">Experience</a>
                <a href="#contact" data-i18n="nav.contact">Contact</a>
            </nav>

            <div class="header-actions">
                <a class="header-link" href="{{ profile.linkedin }}" target="_blank" rel="noreferrer">LinkedIn</a>
                <a class="header-link" href="{{ profile.github }}" target="_blank" rel="noreferrer">GitHub</a>
                <button
                    id="lang-toggle"
                    class="lang-toggle"
                    type="button"
                    aria-label="Toggle language"
                >
                    DE
                </button>
                <a class="connect-button" href="#contact" data-i18n="nav.connect">Let's Connect</a>
            </div>
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p data-i18n="footer.note">
            Professional portfolio of Karthik Chowdary Nunna, focused on autonomous mobility, robotics, and software systems.
        </p>
    </footer>

    <script id="profile-data" type="application/json">{{ profile | tojson }}</script>
    <script src="{{ url_for('static', path='js/main.js') }}?v=20260420-1" defer></script>
</body>
</html>
