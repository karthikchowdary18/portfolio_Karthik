services:
  - type: web
    name: karthik-portfolio-website
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PORTFOLIO_DB_PATH
        value: /var/data/portfolio.db
    disk:
      name: portfolio-data
      mountPath: /var/data
